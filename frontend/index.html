<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBA智能检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container-fluid">
        <header class="text-center py-4 bg-primary text-white">
            <h1>PCBA智能缺陷检测系统</h1>
            <p class="mb-0">基于YOLO的智能检测平台</p>
        </header>

        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">首页</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/">检测</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/history">历史记录</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container mt-4">
            <!-- 上传区域 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h3>上传图片进行检测</h3>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="imageInput" class="form-label">选择图片文件</label>
                        <input type="file" class="form-control" id="imageInput" accept="image/*">
                        <div class="form-text">支持 PNG, JPG, JPEG, BMP 格式</div>
                    </div>
                    <button class="btn btn-primary" id="uploadBtn" onclick="uploadImage()">
                        <span id="uploadBtnText">开始检测</span>
                        <span id="uploadSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </div>
            </div>

            <!-- 预览和结果区域 -->
            <div class="row">
                <!-- 原图预览 -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5>原始图片</h5>
                        </div>
                        <div class="card-body">
                            <div id="originalPreview" class="image-preview">
                                <p class="text-muted text-center">请上传图片</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 检测结果 -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5>检测结果</h5>
                        </div>
                        <div class="card-body">
                            <div id="resultPreview" class="image-preview">
                                <p class="text-muted text-center">等待检测...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 检测结果详情 -->
            <div class="card mb-4" id="detectionDetails" style="display: none;">
                <div class="card-header">
                    <h5>检测详情</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>缺陷名称</th>
                                    <th>缺陷编号</th>
                                    <th>置信度</th>
                                    <th>坐标</th>
                                </tr>
                            </thead>
                            <tbody id="detectionTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-center py-3 bg-light mt-5">
            <p class="mb-0 text-muted">PCBA智能检测系统 © 2024</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
